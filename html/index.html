<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon"       href="favicon.ico" type="image/vnd.microsoft.icon">
<link rel="stylesheet" href="style.css"   type="text/css">
<title>Go test coverage // {{ .ModName }}</title>
</head>
<body id="index">
<header>
<div><img height="12" src="go-blue-gradient.svg"/> <strong>test coverage</strong></div>
<div class="centered"><code><a href="{{ .ModURL }}">{{ .ModName }}</a></code></div>
<div id="buttons" style="display: none; gap: 12px;">
  <button id="expand">expand</button>
  <button id="theme">theme</button>
</div>
</header>
<iframe id="tree" name="tree" src="tree.html"></iframe>
<iframe id="code" name="code"></iframe>
<script>
  if (window.location.protocol !== 'file:') {
    document.getElementById('buttons').style.display = 'flex';
  }

  const applyTheme = (theme) => {
    document.documentElement.setAttribute('theme', theme);
    try {
      localStorage.setItem('user-theme', theme);
    } catch (e) {}
    document.querySelectorAll('iframe').forEach(frame => {
      frame.contentWindow.postMessage({ type: 'SET_THEME', theme: theme }, '*');
    });
  };

  try {
    const saved = localStorage.getItem('user-theme');
    if (saved) applyTheme(saved);
  } catch (e) {}

  document.getElementById('theme').addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('theme');
    const isDark       = currentTheme === 'dark' || (!currentTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
    applyTheme(isDark ? 'light' : 'dark');
  });

  let expanded = false;
  document.getElementById('expand').addEventListener('click', () => {
    expanded = !expanded;
    document.getElementById('expand').textContent = expanded ? 'collapse' : 'expand';
    document.getElementById('tree').contentWindow.postMessage({ type: 'EXPAND_OR_COLLAPSE', expanded: expanded }, '*');
  });
</script>
</body>
</html>
