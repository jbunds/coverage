name:        Go test coverage HTML report
description: Go test coverage HTML report generator
author:      jbunds
branding:
  icon:  layout
  color: blue

runs:
  using: composite
  steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 10 # https://github.com/gwatts/go-coverage-action#example-workflow

    - name: setup-go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.1'

    - name: coverage profile
      uses: gwatts/go-coverage-action@v2
      id:   coverge_profile

    - name: coverage report
      run: |
        go run github.com/jbunds/coverage@latest \
          -coverprofile="${{ steps.coverage_profile.outputs.gocov-pathname }}" \
          -path=./coverage_report

    - name: store coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage report
        path: |
          ./coverage_report/
