<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon"       href="favicon.ico" type="image/vnd.microsoft.icon">
<link rel="stylesheet" href="style.css"   type="text/css">
<title>Go test coverage</title>
</head>
<body id="index">
<header>
<div><strong><img height="12" src="go-blue-gradient.svg"/> test coverage</strong></div>
<div id="buttons" style="display: none; gap: 15px;">
  <button id="expand">expand</button>
  <button id="theme">theme</button>
</div>
</header>
<iframe id="tree" src="tree.html"></iframe>
<iframe id="code" name="code"></iframe>
<script>
  console.log('Protocol check:', window.location.protocol);
  const doc          = document.documentElement;
  const themeButton  = document.getElementById('theme');
  const expandButton = document.getElementById('expand');
  const buttons      = document.getElementById('buttons');

  if (window.location.protocol !== 'file:') {
    buttons.style.display = 'flex';
  }

  const applyTheme = (theme) => {
    doc.setAttribute('theme', theme);
    try {
      localStorage.setItem('user-theme', theme);
    } catch (e) {}
    document.querySelectorAll('iframe').forEach(frame => {
      frame.contentWindow.postMessage({ type: 'SET_THEME', theme: theme }, '*');
    });
  };

  try {
    const saved = localStorage.getItem('user-theme');
    if (saved) applyTheme(saved);
  } catch (e) {}

  themeButton.addEventListener('click', () => {
    const currentTheme = doc.getAttribute('theme');
    const isDark       = currentTheme === 'dark' || (!currentTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
    applyTheme(isDark ? 'light' : 'dark');
  });

  let expanded = false;
  expandButton.addEventListener('click', () => {
    expanded = !expanded;
    expandButton.textContent = expanded ? 'collapse' : 'expand';
    document.getElementById('tree').contentWindow.postMessage({ type: 'EXPAND_OR_COLLAPSE', expanded: expanded }, '*');
  });
</script>
</body>
</html>
