name: deploy Go coverage report to GitHub Pages

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      go-version:
        type:        string
        description: 'Go version'
        required:    false
        defaultl:    '1.26.1'
      coverage-threshold:
        type:        string
        description: 'coverage threshold percentage'
        required:    false
        default:     '0'
      coverage-report-path:
        type:        string
        description: 'path to the root of the Go coverage report'
        required:    false
        default:     'coverage_report'
  push:
    branches: ['main']
    paths:
      - '**/*.go'

concurrency: # avoid races
  group:              'pages'
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Go coverage report
        uses: ./  # './' refers to the action.yml file in the root of this repo; external callers should use "jbunds/coverage@v1"
        with:
          go-version:           ${{ inputs.go-version           || '1.26.1'          }}
          coverage-threshold:   ${{ inputs.coverage-threshold   || '0'               }}
          coverage-report-path: ${{ inputs.coverage-report-path || 'coverage_report' }}

      - name: upload to GitHub Pages          # https://jbunds.github.io/coverage/
        uses: ./.github/actions/upload-pages  # external callers should use "jbunds/coverage/.github/actions/upload-pages@v1"
        with:
          coverage-report-path: ${{ inputs.coverage-report-path || 'coverage_report' }}

  deploy:
    runs-on: ubuntu-latest
    needs:   generate-and-upload
    permissions: # required permissions for the GITHUB_TOKEN to deploy to GitHub Pages
      contents: read
      pages:    write
      id-token: write
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v5
