name: eslint

on:
  workflow_dispatch: # allows this workflow to be manually triggered from the UI
  push:
    branches:
      - main
    paths:
      - 'demo/**/*.js'

jobs:
  lint:
    runs-on: macos-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup node.js
      uses: actions/setup-node@v6
      with:
        node-version:          '25'  # 'lts/*' ?
        cache:                 npm
        cache-dependency-path: demo/package-lock.json

    - name:              npm ci
      run:               npm ci
      working-directory: demo

    - name:              eslint
      run:               npx eslint
      working-directory: demo
