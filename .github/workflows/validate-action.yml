name: validate action

on:
  workflow_dispatch: # allows this workflow to be manually triggered from the UI
  push:
    branches:
      - main
    paths:
      - action.yml

jobs:
  validate:
    runs-on: macos-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup node.js
      uses: actions/setup-node@v6
      with:
        node-version:          '25'
        cache:                 npm
        cache-dependency-path: package-lock.json

    - name: validate action.yml
      run:  npx @action-validator/cli action.yml
